<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body style="background-color: #f9f9f9; margin: 0; padding: 0; text-align: center;">
    <h1 style="margin-top: 50px; color: #333;">Register for Sasquatch Websighting</h1>
    <form action="/registerpage" method="POST" style="width: 400px; margin: auto; padding: 20px; background: #fff; border: 1px solid #ddd; border-radius: 10px;">
        <label for="first_name" style="display: block; text-align: left; margin-bottom: 10px;">First Name:</label>
        <input type="text" name="first_name" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

        <label for="last_name" style="display: block; text-align: left; margin-bottom: 10px;">Last Name:</label>
        <input type="text" name="last_name" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

        <label for="email" style="display: block; text-align: left; margin-bottom: 10px;">Email:</label>
        <input type="email" name="email" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

        <label for="password" style="display: block; text-align: left; margin-bottom: 10px;">Password:</label>
        <input type="password" name="password" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

        <label for="confirm_password" style="display: block; text-align: left; margin-bottom: 10px;">Confirm Password:</label>
        <input type="password" name="confirm_password" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">

        <button type="submit" style="padding: 10px 20px; background: #28a745; color: #fff; border: none; border-radius: 5px;">Register</button>
    </form>
    <p style="margin-top: 15px;">Already have an account? <a href="/" style="color: #007bff;">Login here</a></p>
</body>
</html>
